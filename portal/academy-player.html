<p>Điều tôi thực sự muốn — điều mà tôi đã chạy trốn khỏi suốt nhiều năm vì nó cảm thấy quá ngây thơ để thừa nhận — là được sống như chính mình mà không cần phải chứng minh bất cứ điều gì.</p>

<p>Có một sai lầm mà tôi thấy lặp lại ở hầu hết mọi người đến với hệ thống chuyển hóa:</p>
<p>Họ muốn thay đổi rất nhiệt thành. Nhưng họ chưa bao giờ dừng lại để hỏi: <em>Thay đổi để trở thành ai, và để sống cuộc đời như thế nào?</em></p>
<p>Nếu không có câu hỏi đó được trả lời rõ ràng — bạn sẽ dùng hệ thống này để leo nhanh hơn lên ngọn núi sai.</p>
<hr/>
<h2>I. Hai Loại Mục Tiêu</h2>
<p><strong>Mục tiêu Phương tiện (Means Goals)</strong> là những thứ bạn muốn <em>có</em> hoặc <em>đạt được</em> — không phải vì bản thân chúng có giá trị, mà vì bạn tin chúng sẽ mang lại thứ khác.</p>
<p>Tiền là Mục tiêu Phương tiện. Bằng cấp là Mục tiêu Phương tiện. Chức danh là Mục tiêu Phương tiện. Có nhà, có xe, "thành đạt" theo nghĩa xã hội — tất cả đều là Phương tiện.</p>
<hr/>
<p><strong>Mục tiêu Cuối cùng (End Goals)</strong> là những <em>trạng thái tồn tại</em> bạn thực sự muốn trải nghiệm.</p>
<p>Tự do để di chuyển mà không cần xin phép. Bình an khi một mình. Được nhìn thấy và được nghe mà không cần phải biểu diễn. Ý nghĩa trong công việc — không phải từ người khác công nhận, mà từ chính bạn biết điều mình làm quan trọng.</p>
<p>Đó là những thứ không ai có thể lấy đi. Và đó là những thứ hầu hết chúng ta chưa bao giờ cho phép mình muốn một cách rõ ràng.</p>
<hr/>
<h2>II. Tại Sao Chúng Ta Leo Nhầm Núi</h2>
<p>Culturescape dạy bạn <em>những Mục tiêu Phương tiện nào là đáng theo đuổi.</em> Không ai hỏi bạn: <em>Khi có những thứ đó rồi, bạn muốn cảm thấy như thế nào?</em></p>
<p>Kết quả là: nhiều người đạt được những gì họ nghĩ mình muốn — và cảm thấy trống rỗng. Không phải vì họ không cố gắng đủ. Mà vì những thứ họ đạt được là Phương tiện cho một đích đến mà họ chưa bao giờ xác định rõ.</p>
<p>Cái bẫy tinh vi nhất của Culturescape: nó không chỉ cài niềm tin vào bạn — nó còn xác định <em>cả mục tiêu</em> của bạn.</p>

<p>Phát triển bởi Aaron Beck vào những năm 1960, CBT hiện là phương pháp trị liệu tâm lý được nghiên cứu nhiều nhất trong lịch sử tâm lý học lâm sàng. Hơn 2.000 thử nghiệm đối chứng ngẫu nhiên trong 60 năm. Không phải ý kiến. Khoa học thực nghiệm.</p>

<p>Trong phần lớn thế kỷ 20, khoa học thần kinh tin rằng não bộ cố định sau tuổi trưởng thành. Điều đó đã được chứng minh là sai.</p>

<p><strong>Quy luật Hebbian:</strong> <em>"Neurons that fire together, wire together."</em> Mỗi lần bạn lặp lại một Tuyên ngôn với cảm xúc thật — bạn đang cho hai nhóm neuron kích hoạt cùng nhau. Qua thời gian, kết nối đó trở thành đường cao tốc thần kinh — và suy nghĩ mới về bản thân bắt đầu kích hoạt tự động.</p>
<p><strong>Viện HeartMath:</strong> Tim có hệ thần kinh riêng với khoảng 40.000 neuron — và gửi tín hiệu lên não nhiều hơn là nhận lệnh từ não. Chỉ số <strong>Heart Rate Variability (HRV)</strong> — khi ở trạng thái biết ơn hoặc bình an — tạo sóng nhịp nhàng gọi là <strong>coherence</strong>. Trong trạng thái đó, vỏ não trước trán hoạt động hiệu quả hơn và khả năng tiếp nhận thay đổi tăng lên đáng kể. Giao thức thở 4-6 trong Module 3 có nền tảng trực tiếp từ nghiên cứu này.</p>

<p><strong>Dr. Bruce Lipton</strong> phát hiện: tế bào không nhận lệnh từ DNA. Tế bào nhận lệnh từ môi trường xung quanh nó — thông qua các phân tử hóa học được tạo ra bởi suy nghĩ và cảm xúc của bạn.</p>

<p>Cơ học lượng tử vận hành ở quy mô hạ nguyên tử. Bước nhảy sang hành vi con người chưa được vật lý học kiểm chứng đầy đủ — điều này cần nói thẳng.</p>

<p>Hai người đứng cùng một căn phòng: một người trong trạng thái thiếu thốn sẽ nhận thấy những tín hiệu từ chối. Một người trong trạng thái tự tin sẽ nhận thấy những cơ hội kết nối. Thực tại vật lý giống nhau. Thực tại được quan sát khác hoàn toàn.</p>

<p><strong>Cách thứ hai: Đọc.</strong> Bạn nhìn lại cùng ký ức đó như một nhà khoa học nhìn vào dữ liệu. Sự kiện xảy ra. Tôi cảm thấy điều này. Não tôi rút ra bài học này. Không phán xét sự kiện, không phán xét bản thân lúc đó, không phán xét người liên quan. Chỉ quan sát cơ chế.</p>

<p>Kiểm Toán Lịch Sử hôm nay là cách thứ hai. Không phải để đau lại. Mà để lần đầu tiên bạn nhìn thấy: vòng lặp đang chạy trong bạn không phải do bạn hư — nó được cài đặt từ một điểm cụ thể, trong một hoàn cảnh cụ thể, bởi một bộ não lúc đó không có lựa chọn nào tốt hơn.</p>
<hr/>
<h2>II. Tại Sao Phải Trace Về Nguồn Gốc</h2>
<p>Mỗi Brule có nguồn gốc. Không có Brule nào tự sinh ra. Mỗi cảm xúc quen thuộc — lo lắng, thiếu thốn, không xứng đáng, không an toàn — có điểm bắt đầu: một sự kiện, một câu nói, một hoàn cảnh đã dạy hệ thần kinh của bạn rằng <em>thế giới vận hành theo cách này.</em></p>
<p>Đây là lý do chỉ nhận biết Brule chưa đủ. Bạn có thể đặt tên nó: "tiền khó kiếm và dễ mất." Nhưng nếu không biết nó được cài từ đâu — thì khi bạn cố thay thế nó bằng niềm tin mới, bạn đang sơn lên một bức tường bị nứt từ móng. Lớp sơn mới sẽ bong ra.</p>
<p>Kiểm Toán Lịch Sử đi xuống tầng móng: tìm sự kiện gốc, tìm logic của đứa trẻ đã rút ra bài học đó, và nhìn thấy rõ ràng tại sao bài học đó — dù không còn đúng — đã từng có nghĩa.</p>
<hr/>
<h2>III. Ký Ức Không Đau — Sự Kháng Cự Mới Đau</h2>
<p>Ký ức là thông tin — một chuỗi sự kiện được lưu trữ trong não. Bản thân thông tin không có trọng lượng cảm xúc. Điều tạo ra đau là <em>sự kháng cự với ký ức</em> — câu hỏi "tại sao điều đó xảy ra với mình?", phán xét bản thân hoặc người liên quan, nỗ lực đẩy ký ức đi. Khi bạn tiếp cận ký ức với tâm thế quan sát, nó trở thành dữ liệu. Dữ liệu không đau.</p>

<p><strong>Karim Nader</strong> (Đại học McGill, 2000) chứng minh qua nghiên cứu về <em>Memory Reconsolidation</em>: ký ức không phải bản ghi cứng. Mỗi lần bạn nhớ lại một ký ức, não <em>mở file đó ra</em> — và trong trạng thái mở, ký ức có thể được cập nhật trước khi lưu lại. Điều đó có nghĩa: mỗi lần bạn nhìn lại một ký ức cũ với tâm thế quan sát thay vì sống lại — bạn đang tạo điều kiện để não lưu lại phiên bản mới. Không xóa sự kiện. Nhưng thêm một lớp diễn giải mới lên trên lớp cũ.</p>

<p><strong>Bước 2: Sự Kiện Gốc.</strong> Câu hỏi không phải "tại sao điều đó xảy ra?" Câu hỏi là: <em>"Lần đầu tiên mình nhớ cảm thấy điều này — là khi nào, ở đâu, với ai?"</em> Đừng cố nhớ. Để ký ức tự nổi lên. Nhắm mắt nếu cần. Hỏi nhẹ — không yêu cầu. Đôi khi chỉ là cảm giác mơ hồ — một màu sắc, một giọng nói. Đó cũng là dữ liệu.</p>

<p>Vị trí thứ ba là <strong>quan sát</strong>: họ cũng đang vận hành theo hệ điều hành của họ — được cài đặt từ trước bạn ra đời. Hành vi của họ không phải sự thật về bạn. Đó là dữ liệu về hệ điều hành đang chạy trong họ lúc đó. Tha thứ thật sự — nếu cần — là việc của Ngày 8. Hôm nay chỉ cần nhìn thấy.</p>

<p>Có một mô hình tư duy mà hầu hết mọi người áp dụng khi muốn thay đổi: nhìn thấy vấn đề → tìm giải pháp cho vấn đề đó. Trì hoãn → kỹ thuật quản lý thời gian. Bùng phát → thở sâu. Không tiết kiệm được → ứng dụng tài chính. Không sai. Nhưng thiếu một bước: hỏi xem vấn đề đó là triệu chứng hay nguyên nhân.</p>

<h2>I. Vấn Đề Với Mục Tiêu Thông Thường</h2>
<p>Có một nghịch lý quen thuộc: người ta đạt được mục tiêu đã theo đuổi nhiều năm — rồi cảm thấy trống rỗng hơn mong đợi. Không phải vì họ yếu ý chí. Không phải vì họ không cố đủ. Mà vì mục tiêu đó, ngay từ đầu, không phải thứ họ thực sự muốn.</p>
<p><em>Hedonic adaptation</em> — sự thích nghi khoái lạc — là hiện tượng não tự động điều chỉnh về mức cảm xúc nền sau khi đạt được bất kỳ thành tựu nào. Bộ não được thiết kế để tiếp tục tìm kiếm, không phải để nghỉ ngơi trong thỏa mãn. Nếu thứ bạn đạt được không phải thứ não thực sự muốn — vòng lặp tìm kiếm lại kích hoạt ngay sau đó.</p>
<hr/>
<p>Có hai loại mục tiêu:</p>
<p><strong>Mục Tiêu Phương Tiện</strong> <em>(Means Goals)</em> — trả lời câu hỏi "cái gì": 1 tỷ đồng, thăng chức giám đốc, mua nhà, giảm 10kg. Cụ thể, đo được, có thể theo dõi tiến độ. Nhưng chúng là phương tiện đến một nơi khác — không phải đích đến thật sự.</p>
<p><strong>Mục Tiêu Cuối Cùng</strong> <em>(End Goals)</em> — trả lời câu hỏi "để làm gì": để cảm thấy tự do, để được thấy và chấp nhận, để tạo ra thứ gì đó có ý nghĩa. Đây là những trạng thái — không phải điểm đến.</p>
<p>Khi bạn đặt Mục Tiêu Phương Tiện mà không biết Mục Tiêu Cuối Cùng đằng sau nó — bạn đang leo một ngọn núi mà không biết nó dẫn đến đâu. Bạn có thể leo thành công — và tìm ra đó không phải ngọn núi bạn muốn leo.</p>

  <li>Chỉ cống hiến, không trải nghiệm → kiệt sức, tự phủ nhận, hy sinh không bền vững</li>

<h2>III. Câu Hỏi 1 — Trải Nghiệm</h2>

<p>Đây là câu hỏi về <em>cảm giác sống</em> — không phải về sở hữu.</p>
<p><strong>Tình yêu và mối quan hệ:</strong> Những mối quan hệ bạn muốn sống trong đó trông như thế nào? Bạn muốn cảm thấy gì khi ở bên người thân, bạn bè, đối tác?</p>
<p><strong>Khám phá và phiêu lưu:</strong> Những nơi bạn muốn đến. Những trải nghiệm bạn muốn có trong cơ thể — không phải chụp ảnh đăng lên mà là <em>cảm thấy</em>.</p>

<h2>I. Vấn Đề Với Hình Dung Tương Lai Thông Thường</h2>
<p>Kỹ thuật "hình dung tích cực" tồn tại trong self-help nhiều thập kỷ qua. Và kết quả thường gây thất vọng. <strong>Gabriele Oettingen</strong> (Đại học New York) theo dõi hàng trăm người trong nhiều năm và phát hiện điều ngược intuition: những người hình dung mình đạt được mục tiêu một cách rõ nét và tích cực thường <em>ít</em> đạt được hơn so với những người không thực hành.</p>
<p>Lý do: khi hình dung một trạng thái thành công, não giải phóng một lượng nhỏ <em>dopamine</em> — tương tự như khi mục tiêu thực sự đạt được. Phần thưởng hóa học nhỏ này làm giảm động lực thực hiện hành động thật.</p>
<hr/>
<p>Vấn đề không phải ở bản thân hình dung — mà ở hai thiếu sót cốt lõi:</p>
<p><strong>Thiếu sót 1 — Thiếu cảm xúc thể xác:</strong> Hình dung thuần túy thị giác không đủ để tạo phản ứng sinh lý. Não cần <em>cảm xúc cụ thể</em> đi kèm — không phải "tôi sẽ hạnh phúc", mà là cảm giác thể xác như "ngực mở ra", "vai thư giãn", "thở sâu hơn bình thường."</p>
<p><strong>Thiếu sót 2 — Thiếu cụ thể:</strong> Não cần hình ảnh đủ chi tiết để <em>Mirror Neurons</em> kích hoạt. Khái niệm trừu tượng như "thành công" hay "tự do tài chính" không có đủ thông tin để hệ thần kinh phản chiếu.</p>
<hr/>
<h2>II. Mirror Neurons — Tại Sao Cụ Thể Là Điều Kiện Bắt Buộc</h2>
<p><em>Mirror Neurons</em> được phát hiện vào những năm 1990 bởi nhóm nghiên cứu của <strong>Giacomo Rizzolatti</strong> tại Đại học Parma. Khi quan sát một hành động, những neuron tương tự với việc <em>bạn</em> thực hiện hành động đó cũng kích hoạt. Hệ thống này không phân biệt "thấy thật" và "hình dung đủ sống động."</p>
<blockquote>
<p><strong>Hình dung mơ hồ:</strong> "Tôi thành công và tự do"<br/>→ Mirror Neurons: không đủ thông tin → không kích hoạt</p>
<p><strong>Hình dung 5D:</strong> "Buổi sáng thứ Hai, tiếng sóng, mùi cà phê, cảm giác rộng trong ngực vì không có deadline nào"<br/>→ Mirror Neurons: đủ chi tiết → kích hoạt → cơ thể phản ứng</p>
</blockquote>
<p>Điều này giải thích tại sao cụ thể không phải tùy chọn — là điều kiện thiết yếu để kỹ thuật hoạt động.</p>
<hr/>
<h2>III. Bản Thiết Kế ≠ Vision Board</h2>
<p>Vision board là tập hợp hình ảnh <em>bên ngoài</em> về những thứ bạn muốn <em>có</em>. Bản Thiết Kế Lượng Tử hoạt động theo nguyên lý hoàn toàn khác:</p>

<p>Điểm khác biệt quan trọng nhất là <em>góc nhìn</em>. Khi hình dung tương lai từ góc nhìn <em>của bạn</em> — nhìn ra từ mắt của mình trong tương lai đó, không phải nhìn vào mình từ bên ngoài — Mirror Neurons kích hoạt mạnh gấp nhiều lần. Đó là khác biệt giữa <em>xem phim</em> và <em>ở trong phim</em>.</p>
<hr/>
<h2>IV. Khoa Học Của "Ký Ức Tương Lai"</h2>
<p><strong>Dr. Joe Dispenza</strong> mô tả kỹ thuật này như "Ký ức Tương lai" — não bộ không phân biệt ký ức thật và trải nghiệm đủ sống động. Khi tạo ra được cảm xúc thật trong khi trải nghiệm một tương lai tưởng tượng, cơ thể phản ứng như thể trải nghiệm đó đang xảy ra.</p>
<p>Ba cơ chế sinh học được kích hoạt:</p>
<p><strong>1. Epigenetics</strong> — Cơ thể sản xuất hóa chất của trạng thái bạn đang trải nghiệm (dù tưởng tượng), từ đó bật tắt gen tương ứng. Dr. <strong>Bruce Lipton</strong> gọi đây là cơ chế cảm xúc bật tắt gen thực sự.</p>
<p><strong>2. RAS (Hệ thống Kích hoạt Lưới)</strong> — Não bộ bắt đầu lọc thông tin khớp với danh tính mới. Cơ hội, người, tài nguyên từng bị lọc ra trước đó — nay bắt đầu được chú ý.</p>
<p><strong>3. Hành vi tự nhiên</strong> — Khi danh tính thay đổi, hành động thay đổi tự nhiên theo — không cần ý chí ép buộc. Đây là cơ chế LÀ → LÀM → CÓ hoạt động ở tầng sinh lý học.</p>
<hr/>
<h2>V. Hệ Thống 5D — Từng Giác Quan</h2>
<p><strong>5D</strong> là 5 kênh giác quan cần được kích hoạt đồng thời để tạo "ký ức tương lai" đủ sống động:</p>
<p><strong>1. Thị giác — Thấy:</strong> Bạn đang ở đâu? Màu sắc, ánh sáng, không gian trông như thế nào?</p>
<p><strong>2. Thính giác — Nghe:</strong> Âm thanh nào đang có? Giọng nói, nhạc, tiếng thiên nhiên, hay sự im lặng?</p>
<p><strong>3. Khứu giác — Ngửi:</strong> Mùi gì? Không khí ra sao?</p>
<p><strong>4. Xúc giác — Chạm:</strong> Cơ thể đang tiếp xúc bề mặt nào? Nhiệt độ? Nặng nhẹ của cơ thể?</p>
<p><strong>5. Cảm xúc thể xác — Cảm nhận trong cơ thể:</strong> Đây là kênh quan trọng nhất và thường bị bỏ qua nhất. Không phải "Tôi hạnh phúc" — mà là: ngực cảm thấy thế nào? Vai? Bụng? Thở sâu hay nông?</p>

<h2>I. Tại Sao Affirmations Thường Thất Bại</h2>
<p>Affirmations không phải khái niệm sai. Vấn đề nằm ở cách hầu hết mọi người thực hành chúng — sai về ba mặt căn bản.</p>

<h2>II. Quy Luật Hebbian — Cơ Sở Khoa Học</h2>
<p><strong>Donald Hebb</strong> (1904–1985) đề xuất năm 1949 nguyên lý về sự học của hệ thần kinh: <em>"Neurons that fire together, wire together."</em></p>
<p>Cơ chế: khi hai neuron kích hoạt đồng thời, kết nối synapse giữa chúng mạnh lên. Khi pattern đó lặp lại đủ nhiều, <em>myelin</em> bao quanh sợi trục — tăng tốc dẫn truyền. Đường mòn được myelinated trở thành mặc định của não — hành vi và suy nghĩ đi theo đường đó tự động.</p>
<p>Từ khóa trong Quy luật Hebbian là <em>cùng lúc</em>. "Đọc Tuyên ngôn" và "cảm xúc thể xác thật" phải kích hoạt đồng thời để synapse được strengthen. Nếu chỉ đọc mà không có cảm xúc — về mặt thần kinh học — không có gì xảy ra.</p>
<p>Đây là lý do cảm xúc không phải bước tùy chọn — là điều kiện sinh học bắt buộc.</p>
<hr/>

  </tbody>
</table>
<p>Khác biệt quan trọng nhất là <em>nguồn gốc</em>. Affirmation lấy từ mẫu chung — không kết nối với trải nghiệm cảm xúc thật của người đọc. Tuyên ngôn được viết từ Bản Thiết Kế cá nhân — ngôn ngữ của nó xuất phát từ khoảnh khắc cụ thể mà cơ thể người đó đã từng phản ứng thật.</p>

<h2>IV. Ba Yếu Tố Của Tuyên Ngôn Mạnh</h2>
<p><strong>Yếu tố 1 — Ngôi hiện tại</strong></p>
<p>Bắt đầu bằng "Tôi là", "Tôi có", "Tôi sống", "Tôi tạo ra" — luôn ở thì hiện tại. Không bao giờ "Tôi sẽ", "Tôi đang cố", "Tôi muốn trở thành." Khi não nghe "Tôi là X", RAS bắt đầu lọc thông tin khớp với X — cơ hội, người, tình huống từng bị bỏ qua nay được chú ý.</p>
<p><strong>Yếu tố 2 — Cụ thể từ Bản Thiết Kế</strong></p>
<p>Tuyên ngôn không mô tả <em>kết quả muốn có</em> — mô tả <em>danh tính của người sống trong Bản Thiết Kế đó</em>. Ngôn ngữ lấy từ cảm xúc thể xác đã viết ở Ngày 10.</p>
<blockquote>

<p><strong>Bản Thiết Kế:</strong> "Ăn tối cùng bạn bè, nói điều thực sự nghĩ, không cần diễn gì"<br/>→ <strong>Affirmation (sai):</strong> "Tôi sẽ có các mối quan hệ sâu sắc"<br/>→ <strong>Tuyên ngôn (đúng):</strong> "Tôi là người đủ an toàn để hiện diện hoàn toàn"</p>

<p><strong>Yếu tố 3 — Cơ thể phản ứng khi đọc</strong></p>

<h2>I. Vấn Đề Với Kỷ Luật Thông Thường</h2>
<p>Hầu hết cách tiếp cận kỷ luật cá nhân đều xây trên cùng một nền: <em>nếu bạn đủ muốn, bạn sẽ làm được</em>. Từ đó rút ra — nếu bạn không làm được, là vì bạn không đủ muốn.</p>

<p><em>Willpower</em> — ý chí — là tài nguyên có hạn. Nghiên cứu của <strong>Roy Baumeister</strong> (Florida State University, 1998) đặt tên cho hiện tượng này là <em>ego depletion</em>: sau mỗi quyết định và mỗi lần kháng cự, tài nguyên nhận thức giảm xuống. Đến cuối ngày, não bạn thật sự ít khả năng kháng cự hơn buổi sáng — không phải vì tính cách yếu, mà vì đó là cách não vận hành.</p>

<p>Không phải "chỉ làm những gì thích." Định nghĩa đó bỏ qua kỷ luật hoàn toàn.</p>

<p><strong>Cortisol</strong> là hormone stress. Khi bạn làm gì đó từ trạng thái căng thẳng nhẹ — "phải hoàn thành", "sợ tụt lùi", "chứng minh cho bản thân" — cơ thể tiết cortisol ở mức nền. Không đủ để gây hại ngay, nhưng đủ để giảm khả năng tập trung sâu, tăng khả năng bỏ cuộc khi gặp trở ngại, và liên kết hoạt động với cảm giác nặng nề.</p>
<p><strong>DHEA</strong> (Dehydroepiandrosterone) là hormone đối lập — được gọi là "hormone xây dựng". Được tiết khi cơ thể ở trạng thái đủ đầy, an toàn, kết nối. Nghiên cứu <strong>HeartMath Institute</strong> (McCraty et al., 2001) cho thấy trạng thái <em>heart coherence</em> tăng DHEA và giảm cortisol đồng thời.</p>
<p>Cùng 20 phút thiền. Nếu bắt đầu từ "phải" → cortisol nền cao, DHEA thấp → não ghi nhận là gánh nặng. Nếu bắt đầu từ kết nối với lý do thật sự → ngược lại. Thói quen không cạn kiệt vì bạn thiếu kỷ luật. Nó cạn kiệt vì não bạn học được rằng hoạt động đó đi kèm với cảm giác gánh nặng.</p>

        reading: `<div class="reading-content">

<h2>I. Phát Hiện Làm Đảo Lộn Thần Kinh Học</h2>
<p>Năm 1991, tại Đại học Parma (Ý), <strong>Giacomo Rizzolatti</strong> phát hiện một nhóm tế bào thần kinh kích hoạt không phải khi con vật <em>thực hiện</em> hành động, mà khi nó <em>quan sát</em> người khác thực hiện hành động đó. Ông đặt tên chúng là <em>Mirror Neurons</em> — Tế bào thần kinh gương.</p>
<p>Ở người, hệ thống gương hoạt động mở rộng hơn: não người kích hoạt tế bào gương không chỉ khi làm hoặc quan sát, mà còn khi <em>tưởng tượng đủ sống động</em>. Nghiên cứu fMRI của Jeannerod (1994) cho thấy tưởng tượng thực hiện một động tác kích hoạt cùng vùng não với việc thực sự thực hiện — với mức độ trùng khớp lên đến 80%.</p>

<p>Khi não kích hoạt phản ứng như thể đang trải nghiệm một trạng thái, nó tiếp tục xuống hệ thống nội tiết và phát lệnh sản xuất hóa chất tương ứng.</p>
<p><strong>Dopamine</strong> — không phải hóa chất của phần thưởng, mà là hóa chất của <em>kỳ vọng có cơ sở</em>. Tăng khi não tin rằng trạng thái mong muốn đang trở nên gần hơn — tạo ra trạng thái tâm lý của người <em>đang tiến về phía trước</em>.</p>
<p><strong>Serotonin</strong> — tín hiệu của sự đủ đầy và yên bình với hiện tại: "Tôi đủ, tôi an toàn, tôi không cần chứng minh gì." Thực hành Ký ức Tương lai với cảm giác <em>đã là</em> người đó tăng serotonin nền theo thời gian.</p>
<p><strong>Oxytocin</strong> — tín hiệu "môi trường này an toàn." Khi oxytocin tăng, amygdala giảm hoạt động, vỏ não trước trán hoạt động tốt hơn — vùng não của tư duy sáng tạo và xây dựng danh tính mới.</p>

<p><strong>Dr. Bruce Lipton</strong> trong <em>The Biology of Belief</em> (2005) đã chứng minh: cùng một ADN, với môi trường hóa học khác nhau trong tế bào, biểu hiện gen hoàn toàn khác. Tế bào đặt trong môi trường hóa chất của stress → gen phòng vệ bật, gen xây dựng tắt. Cùng tế bào đó trong môi trường đủ đầy → ngược lại.</p>
<pre style="background:rgba(197,168,128,0.07);padding:14px;border-radius:3px;font-size:.78rem;line-height:1.8">Suy nghĩ / Cảm xúc lặp lại

        ↓

<p><em>"Ý thức kiểm soát sinh học. Không phải ngược lại."</em> — <strong>Dr. Bruce Lipton</strong></p>

<p><strong>Luyện Tập Dưới Áp Lực Nhân Tạo</strong></p>
<p>Cờ Tàn thật không xảy ra trong phòng yên tĩnh. Một lần mỗi tuần, thực hiện bài tập ở Bước 1–4 tại một nơi có nhiễu nhẹ — quán cà phê, phòng chờ, cạnh một cuộc trò chuyện đang diễn ra gần đó. Mục tiêu không phải chặn tiếng ồn — mà giữ được 5 giây tập trung <em>cùng lúc với</em> tiếng ồn đang tồn tại.</p>
<p><strong>Sai Lầm Thường Gặp</strong></p>
<ul>
<li><strong>Cố "làm trống đầu óc" hoàn toàn.</strong> Đây không phải mục tiêu. Mục tiêu là giữ chú ý ở một điểm, không phải loại bỏ mọi suy nghĩ.</li>
<li><strong>Tăng thời gian quá nhanh.</strong> Nhảy thẳng lên 30 giây trước khi làm chủ 5 giây tạo cảm giác thất bại liên tục, làm giảm động lực. Tiến độ chậm và chắc quan trọng hơn tốc độ.</li>
<li><strong>Chỉ luyện trong không gian yên tĩnh.</strong> Nếu không luyện dưới áp lực nhân tạo, kỹ năng không chuyển sang được tình huống thật.</li>
</ul>

<p>Đơn hàng 27 triệu mà tôi kể ở Ngày 2 — khoảnh khắc quyết định không phải là lúc tôi gửi tin nhắn. Là lúc tôi <strong>dừng lại</strong> trước khi gửi. Đó chính là một khoảnh khắc Cờ Tàn, dù lúc đó tôi chưa có ngôn ngữ để gọi tên nó: một khoảnh khắc tập trung tuyệt đối, tách khỏi sự hoảng loạn đang thôi thúc tôi gửi ngay, nhắn thêm, theo dõi thêm. 5 giây dừng lại đó là toàn bộ sự khác biệt giữa một tin nhắn từ sự đói khát và một tin nhắn từ sự đủ đầy.</p>

<h2>Phần IV — Tầng 2: Xây Dựng Vùng Mềm (The Soft Zone)</h2>
<p><strong>Định Nghĩa & Khoa Học</strong></p>
<p>Waitzkin gọi trạng thái đối lập là <strong>Vùng Cứng</strong> — trạng thái chỉ vận hành tốt khi điều kiện hoàn hảo: đủ yên tĩnh, đủ thời gian, không ai làm phiền. Vùng Cứng hiệu quả trên giấy, nhưng vỡ vụn ngay khi thực tế không hợp tác — và thực tế gần như không bao giờ hợp tác.</p>
<p><strong>Vùng Mềm</strong> là trạng thái biến điều kiện không hoàn hảo thành nhiên liệu thay vì trở ngại. Đây là ứng dụng hiện đại của <em>Vô Vi</em> — không phải không hành động, mà hành động hòa với những gì đang thật sự xảy ra, thay vì kháng cự nó.</p>
<p>Về mặt sinh lý học: khả năng này liên quan trực tiếp đến <strong>biến thiên nhịp tim (Heart Rate Variability — HRV)</strong> — chỉ số đo khả năng hệ thần kinh chuyển đổi linh hoạt giữa trạng thái giao cảm (hành động, phản ứng) và phó giao cảm (phục hồi, bình tĩnh). HRV cao đồng nghĩa với khả năng hấp thụ một cú sốc — một tin xấu, một gián đoạn — và quay lại trạng thái ổn định nhanh hơn. Đây chính xác là điều Giai đoạn 1 của Quy Trình Thiền Tái Sinh (Đồng bộ Tim-Não) đã âm thầm rèn luyện từ Ngày 14. Tầng 2 của giao thức này lấy khả năng đó ra khỏi phòng thiền, và luyện nó dưới áp lực thật.</p>
<p><strong>Bài Tập Chính — Nhật Ký Ma Sát Thành Nhiên Liệu</strong></p>
<p>Trong 7 ngày, mỗi khi có một gián đoạn xảy ra giữa lúc bạn đang tập trung — một cuộc gọi, một tin nhắn bất ngờ, một kế hoạch bị hủy — dừng lại 10 giây và ghi ngay:</p>
<p class="wb-q">Gián đoạn:</p>
${ta('b3_t2_journal_event', 1)}
<p class="wb-q">Phản ứng đầu tiên của cơ thể (căng ở đâu, thở thế nào):</p>
${ta('b3_t2_journal_reaction', 1)}
<p class="wb-q">Cách gián đoạn này có thể trở thành thông tin thay vì mối đe dọa:</p>
${ta('b3_t2_journal_reframe', 2)}
<blockquote><p>Ví dụ: khách hàng hủy cuộc hẹn phút chót → phản ứng đầu tiên: ngực thắt lại, muốn kiểm soát lại lịch → thông tin: có thể đây là dấu hiệu người này chưa phù hợp, hoặc đây là khoảng trống để chuẩn bị tốt hơn cho cuộc hẹn tiếp theo.</p></blockquote>
<p><strong>Biến Thể Nâng Cao — Gián Đoạn Có Chủ Đích</strong></p>
<p>Waitzkin luyện bằng cách nhờ người khác cố ý làm phiền mình giữa lúc đang tập trung cao độ — để hệ thần kinh quen với việc giữ Vùng Mềm dưới áp lực thật, thay vì chỉ trong môi trường lý tưởng. Đây là một hình thức của <strong>luyện tập tiêm chủng stress (stress inoculation)</strong> — tiếp xúc với liều lượng nhỏ, có kiểm soát, của điều gây căng thẳng, để hệ thần kinh xây khả năng chịu đựng cao hơn.</p>
<p><strong>Cách áp dụng:</strong> một lần mỗi tuần, khi đang làm việc cần tập trung sâu, chủ động để một nguồn xao nhãng nhỏ xuất hiện — hẹn giờ điện thoại kêu giữa chừng, hoặc nhờ người thân hỏi một câu bất kỳ.</p>
<p>Khi nó xảy ra — quan sát: cơ thể phản ứng bằng Vùng Cứng (căng, cáu, mất nhịp hoàn toàn) hay Vùng Mềm (hấp thụ, quay lại nhanh)?</p>

${ta('b3_t2_practice_reaction', 1)}
<p class="wb-q">Thời gian quay lại trạng thái tập trung sau gián đoạn:</p>
${ta('b3_t2_practice_recovery', 1)}
<p style="font-size:.8rem;color:#A8A39D;font-style:italic">Mục tiêu không phải là không bị làm phiền. Mục tiêu là thời gian quay lại ngày càng ngắn.</p>
<p><strong>Sai Lầm Thường Gặp</strong></p>
<ul>
<li><strong>Nhầm Vùng Mềm với sự thụ động.</strong> Vùng Mềm vẫn hành động — chỉ là không kháng cự với những gì đã xảy ra trước khi hành động.</li>
<li><strong>Tránh né mọi tình huống có thể gây gián đoạn</strong> để "bảo vệ" sự tập trung. Điều này củng cố Vùng Cứng, không xây Vùng Mềm — vì kỹ năng chỉ hình thành khi có ma sát thật để luyện với nó.</li>
<li><strong>Đánh giá thành công bằng việc "không cảm thấy gì" khi bị gián đoạn.</strong> Cảm giác căng ban đầu là bình thường, kể cả ở người đã luyện lâu. Thước đo thật là tốc độ quay lại, không phải việc có cảm giác hay không.</li>
</ul>

<h2>Phần V — Tầng 3: Mã Hóa Giác Quan 5D (Sensory Stacking)</h2>
<p><strong>Định Nghĩa & Khoa Học</strong></p>
<p>Ký ức Tương lai ở Ngày 14 dạy bạn hình dung bằng 5 giác quan. Tầng 3 của giao thức này nâng bài tập đó lên một mức: không chỉ hình dung trong lúc thiền, mà mã hóa nó đủ sâu để rò rỉ vào hành vi hàng ngày.</p>
<p>Sự khác biệt giữa "phim 2D trong tâm trí" và "thực tế ảo 5D": phim 2D bạn <em>xem</em> từ bên ngoài — thực tế ảo 5D bạn <em>ở trong đó</em>, và cơ thể phản ứng hóa học như thể nó đang thật sự xảy ra.</p>
<p>Cơ chế đứng sau: <strong>tế bào thần kinh gương (mirror neurons)</strong> — nhóm neuron kích hoạt cả khi bạn thực hiện một hành động lẫn khi bạn hình dung sống động về nó. Đây là lý do vận động viên dùng hình dung để luyện tập kỹ năng vật lý mà không cần di chuyển cơ thể. Khi hình dung đủ chi tiết ở cả 5 giác quan, não bộ kích hoạt gần như cùng một mạng lưới thần kinh như khi trải nghiệm thật — và cơ thể bắt đầu sản xuất <strong>Dopamine, Serotonin, Oxytocin</strong> như thể trạng thái đích đã xảy ra. Đây là cơ chế mà <strong>Dr. Bruce Lipton</strong> gọi là biểu sinh học đang hoạt động: hóa chất do trạng thái cảm xúc tạo ra ảnh hưởng trực tiếp đến cách gen biểu hiện.</p>
<p><strong>Bài Tập Chính — Kịch Bản 5D Mở Rộng</strong></p>
<p>Dùng lại trạng thái đích từ Bản Thiết Kế Lượng Tử (Ngày 10). Lần này, điền đầy đủ cả 5 lớp — không bỏ trống lớp nào, kể cả lớp khó nhất:</p>

${ta('b3_t3_visual', 2)}

${ta('b3_t3_audio', 2)}

<blockquote><p>Nếu điểm dưới 6 — quay lại, viết cụ thể hơn cho lớp giác quan yếu nhất, cho đến khi ngực bạn phản ứng khi đọc lại. Một lớp mơ hồ ("cảm thấy tốt") là dấu hiệu cơ thể chưa tin vào lớp đó.</p></blockquote>
<p><strong>Biến Thể Nâng Cao — Neo Giác Quan (Sensory Anchor)</strong></p>
<p>Chọn một vật thể nhỏ, mang theo được — một chiếc nhẫn, một chiếc vòng, một viên đá nhỏ trong túi. Trong lúc cảm giác đủ đầy từ Kịch Bản 5D đang ở mức cao nhất (ngay sau khi thiền, hoặc ngay sau khi đọc lại kịch bản), chạm vào vật thể đó trong 5–10 giây, để cơ thể liên kết cảm giác đó với vật thể.</p>
<p>Sau một thời gian lặp lại, việc chạm vào vật thể đó — giữa một cuộc họp căng thẳng, trước một quyết định khó — có thể gọi lại một phần cảm giác đủ đầy đó, ngay tại chỗ, không cần nhắm mắt hay ngồi thiền.</p>
<p class="wb-q">Vật thể tôi chọn làm Neo Giác Quan:</p>
${ta('b3_t3_anchor_object', 1)}

${ta('b3_t3_anchor_count', 1)}
<p><strong>Bài Tập Rò Rỉ Vào Ngày Thường</strong></p>
<p>Một lần mỗi ngày, ngoài giờ thiền — trong một khoảnh khắc bình thường (đang đi bộ, đang chờ, đang rửa bát) — gọi lại một lớp giác quan từ kịch bản trên trong 10–15 giây, không cần nhắm mắt, không cần nghi thức.</p>
<p class="wb-q">Lớp giác quan gọi lại hôm nay:</p>
${ta('b3_t3_leak_layer', 1)}

${ta('b3_t3_leak_context', 1)}
<p><strong>Sai Lầm Thường Gặp</strong></p>
<ul>
<li><strong>Chỉ tập trung vào lớp thị giác</strong>, bỏ qua các lớp còn lại vì chúng khó hình dung hơn. Lớp thị giác là lớp dễ nhất và cũng là lớp yếu nhất để tạo phản ứng hóa học thật — cảm giác cơ thể (interoception) mới là lớp có tác động mạnh nhất.</li>
<li><strong>Coi đây là một bài tập "vision board" bằng lời.</strong> Vision board tĩnh, nhìn từ bên ngoài. Kịch bản 5D phải được trải nghiệm từ bên trong — bằng ngôi thứ nhất, không phải quan sát một hình ảnh.</li>
<li><strong>Làm bài tập chỉ một lần rồi coi là xong.</strong> Kịch bản cần được đọc lại và tinh chỉnh nhiều lần — mỗi lần cơ thể phản ứng mạnh hơn một chút, cho đến khi phản ứng đó trở nên quen thuộc.</li>
</ul>

<h2>Phần VI — Tầng 4: Chữ Ký Cảm Xúc & Surrender</h2>
<p><strong>Định Nghĩa & Khoa Học</strong></p>
<p>Đây là tầng hầu hết mọi người bỏ qua — và vì thế mọi nỗ lực ở Tầng 1–3 sụp đổ ngay trước vạch đích. Bạn gieo ý định với đầy đủ cảm xúc và giác quan (Tầng 1–3), rồi phải <strong>buông</strong> — vì sự kiểm soát ám ảnh chính là bằng chứng bạn chưa thực sự tin mình đã là người đó. Người đã có điều đó rồi không cần theo dõi nó mỗi giờ.</p>
<p>Nghiên cứu về <strong>locus of control</strong> (điểm kiểm soát) trong tâm lý học cho thấy: người có xu hướng tin rằng kết quả nằm hoàn toàn trong tầm kiểm soát trực tiếp, tức thời của họ, thường trải nghiệm mức độ lo âu cao hơn khi kết quả chưa xuất hiện ngay — vì mọi khoảng trễ đều bị diễn giải là "tôi chưa làm đủ, tôi cần làm thêm." Vòng lặp này giữ hệ thần kinh giao cảm luôn bật, giữ Cortisol luôn cao — chính là trạng thái đối lập hoàn toàn với những gì Tầng 1–3 vừa xây dựng.</p>
<p>Buông không phải từ bỏ mục tiêu. Buông là tách hành động (đã làm ở mức tốt nhất có thể) ra khỏi việc giám sát kết quả (không thuộc quyền kiểm soát trực tiếp của bạn). Đây là sự khác biệt giữa Force và Power đã học ở Ngày 19, áp dụng vào giai đoạn sau khi hành động đã xảy ra — không chỉ giai đoạn trước và trong khi hành động.</p>
<p><strong>Nghi Thức Gieo & Buông</strong></p>

        reading: `<div class="reading-content">

<p>Có một nghịch lý mà nhiều người trong hành trình tự phát triển đối mặt: càng cố gắng, càng mệt — nhưng kết quả không tỷ lệ thuận. Lý do không phải thiếu quyết tâm, thiếu kỷ luật, hay thiếu công cụ. Lý do là hành động đang được tạo ra từ nguồn sai.</p>

<p><strong>Force — Hành Động Từ Thiếu Hụt.</strong> Hành động để thoát khỏi một cảm giác tồi (lo lắng, tội lỗi, sợ tụt hậu). Cần kết quả ngay để cảm thấy bản thân ổn. Kiểm tra phản hồi liên tục. Mệt sau khi "thành công" — vì thành công bên ngoài không lấp đầy câu hỏi bên trong: <em>"Mình có đủ tốt không?"</em></p>
<p><strong>Power — Hành Động Từ Đủ Đầy.</strong> Hành động <em>từ</em> một danh tính, không <em>để</em> có một danh tính. Kết quả là thông tin, không phải xác nhận giá trị bản thân. Năng lượng tăng trong quá trình làm, không cạn kiệt. Thất bại bên ngoài không phá vỡ trạng thái bên trong.</p>

<h2>III. Inspired Action — Hành Động Truyền Cảm</h2>
<p><em>Inspired Action</em> là loại hành động xuất hiện từ danh tính đã ổn định — không phải từ ý chí ép buộc. Đặc điểm: hành động xuất hiện như "bước tiếp theo hiển nhiên" thay vì cần tranh luận với bản thân để bắt đầu.</p>
<p>Cơ chế thần kinh học: khi danh tính shift đủ vững, <strong>RAS (Reticular Activating System)</strong> bắt đầu lọc thông tin khác đi. RAS quyết định thông tin nào được đưa lên ý thức có ý thức. Khi bạn <em>là</em> người có mục tiêu X: RAS tự động đưa lên những cơ hội, kết nối, và bước đi liên quan đến X mà trước đây bị lọc ra.</p>

<h2>I. Observer Effect — Cơ Chế Thần Kinh Học</h2>
<p>Trong vật lý lượng tử, Hiệu ứng Người Quan Sát mô tả: hành vi của hạt lượng tử thay đổi tùy theo việc nó có bị quan sát hay không. Ứng dụng trực tiếp vào ý thức con người là bước nhảy khoa học chưa hoàn toàn kiểm chứng — nhưng có một <em>ẩn dụ chính xác</em> ở cấp độ tâm lý học, và cơ chế thần kinh học đằng sau ẩn dụ đó là thật: đó là RAS.</p>
<p><strong>RAS (Reticular Activating System)</strong> là cổng lọc giữa giác quan và ý thức. Mỗi giây hệ thần kinh nhận ~400 tỷ bit thông tin — ý thức xử lý được khoảng 2.000 bit. RAS quyết định 0.001% đó là gì, dựa trên tiêu chí: <em>những gì liên quan đến danh tính và giá trị hiện tại của bạn</em>. Khi danh tính thay đổi — bộ lọc thay đổi — và bạn bắt đầu "nhìn thấy" những điều luôn ở đó nhưng trước đây bị lọc ra.</p>

<h2>II. Synchronicity — Ba Loại Tín Hiệu</h2>
<p><strong>Carl Jung</strong> (1950s) quan sát: bệnh nhân thường báo cáo những "trùng hợp có ý nghĩa" xuất hiện đúng lúc các chuyển hóa tâm lý đang diễn ra. Trong khuôn khổ QROS, có thể hiểu qua hai cơ chế: (1) RAS — khi danh tính shift, bạn nhận ra những cơ hội và người luôn có mặt nhưng bị lọc ra. (2) Tín hiệu xã hội — khi trạng thái bên trong thay đổi, ngôn ngữ cơ thể và sự hiện diện thay đổi theo, người khác phản ứng khác đi.</p>
<p><strong>Ba loại tín hiệu phản hồi từ môi trường:</strong></p>
<p><strong>Tín hiệu cộng hưởng</strong> — điều xuất hiện dễ hơn bình thường: cuộc trò chuyện mở ra tự nhiên, cơ hội đến mà không cần đẩy mạnh. Đây là thông tin rằng tần số hiện tại của bạn đang thu hút điều này.</p>
<p><strong>Tín hiệu ma sát</strong> — điều liên tục gặp trở ngại: cùng một vấn đề xuất hiện nhiều lần theo nhiều hình thức. Câu hỏi hữu ích: <em>"Điều gì đang được yêu cầu xem xét lại?"</em></p>
<p><strong>Tín hiệu im lặng</strong> — không có gì rõ ràng xảy ra. Liên quan đến <em>Độ trễ Vật chất</em> — khoảng cách giữa khi năng lượng shift và khi biểu hiện vật chất xuất hiện. Im lặng thường là dấu hiệu tích hợp đang diễn ra bên dưới bề mặt.</p>

<p>Nếu bạn đã ở đây 21 ngày — người đó không còn là bạn nữa. Không phải vì cuộc sống đã hoàn hảo. Mà vì có điều đã thay đổi ở tầng sâu hơn. Tên của hệ điều hành mới là <strong>Sovereign</strong>.</p>

<p>Danh tính mới là <strong>nền tảng xuất phát</strong> — không phải đỉnh núi. Từ đây, bạn bắt đầu leo những ngọn núi mà người trước đây không thể nhìn thấy từ dưới thung lũng. Người bạn đang là hôm nay là cơ sở cho người bạn sẽ là sau một năm, sau năm năm.</p>

<p><strong>Cam kết từ danh tính:</strong> <em>"Đây là người tôi đang là. Tôi tiếp tục sống từ chỗ đó."</em> — Không cần hứa hẹn nhiều vì không có khoảng cách giữa người hứa và người được hứa — đó là cùng một người.</p>
<p>Sẽ có những ngày quên. Đây không phải cảnh báo — đây là thực tế của mọi thay đổi thật sự. Điều thay đổi sau 21 ngày không phải là những ngày đó sẽ không xảy ra. Điều thay đổi là <strong>đường về ngắn hơn</strong>.</p>

<p><strong>Creator Consciousness:</strong> cuộc sống là điều bạn tham gia kiến tạo. Kết quả là thông tin để quan sát và điều chỉnh. Người trong Creator Consciousness không phủ nhận thực tại khó — họ chỉ không để thực tại khó viết lại câu trả lời cho câu hỏi <em>"Mình là ai?"</em></p>
<p>21 ngày qua là hành trình từ Victim về Creator — không phải một lần và xong, mà là một hướng đi bạn đã bước rõ ràng hơn về phía đó.</p>

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    const completed = new Set(JSON.parse(localStorage.getItem('qros_completed') || '[]'));
    let currentDay = 1;

    function saveProgress() {
      localStorage.setItem('qros_completed', JSON.stringify([...completed]));
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    // Đề mục Bonus và đề mục Chương Trình Chính là hai danh sách tách biệt —
    // chỉ kết hợp khi nội dung thật sự liên quan (nhắc trong bài đọc), không gộp menu điều hướng.
    function contextDays(day) {
      const ref = DAYS.find(function (x) { return x.day === day; });
      const isBonus = !!(ref && ref.module === 7);
      return DAYS.filter(function (x) { return isBonus ? x.module === 7 : x.module !== 7; });
    }

    function buildSidebarHTML() {
      let html = '';
      let lastMod = -1;
      const list = contextDays(currentDay);

      list.forEach(function (d) {
        if (d.module !== lastMod) {
          if (lastMod !== -1) html += '</div>';
          const modLabel = d.module === 7 ? 'Bonus' : ('Module ' + d.module);
          html += `
            <div class="sb-module-label">${modLabel}</div>
            <div class="sb-module-title">${MODULES[d.module]}</div>
            <div>`;
          lastMod = d.module;
        }
        const isInt   = d.type === 'integration';
        const isOri   = d.type === 'orientation';
        const isBonus = d.type === 'bonus';
        const active = d.day === currentDay;
        const done   = completed.has(d.day);

        html += `<a href="?day=${d.day}"
          class="sb-day${active ? ' active' : ''}${done ? ' done' : ''}${isInt ? ' sb-integration' : ''}"
          onclick="return goDay(${d.day})">
          <span class="sb-day-num">${isInt ? '✦' : isOri ? '▶' : isBonus ? '★' : d.day}</span>
          <span class="sb-day-name">${d.title}</span>
          ${done ? '<span class="sb-check">✓</span>' : ''}
        </a>`;
      });
      html += '</div>';
      return html;
    }

    function renderSidebar() {
      const html = buildSidebarHTML();
      document.getElementById('sidebar').innerHTML = html;
      document.getElementById('drawer-sidebar').innerHTML = html;
    }

    function renderMobileDaybar() {
      const d = DAYS.find(function (x) { return x.day === currentDay; });
      if (!d) return;
      const list  = contextDays(currentDay);
      const idx   = list.findIndex(function (x) { return x.day === currentDay; });
      const prevD = list[idx - 1];
      const nextD = list[idx + 1];

      document.getElementById('mdb-day-label').textContent  = d.type === 'bonus' ? 'Bonus · Miễn phí' : ('Module ' + d.module + ' · Ngày ' + d.day);
      document.getElementById('mdb-day-title').textContent  = d.title;
      document.getElementById('mdb-prev').disabled = !prevD;
      document.getElementById('mdb-next').disabled = !nextD;
    }

    function mdbNav(dir) {
      const list = contextDays(currentDay);
      const idx  = list.findIndex(function (x) { return x.day === currentDay; });
      const target = dir === 'prev' ? list[idx - 1] : list[idx + 1];
      if (target) goDay(target.day);
    }

    function openDrawer() {
      document.getElementById('mobile-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('mobile-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }

    // ═══════════════════════════════════════════════════════════════
    // CONTENT RENDERERS
    // ═══════════════════════════════════════════════════════════════
    function renderContent() {
      const d = DAYS.find(function (x) { return x.day === currentDay; });
      if (!d) return;

      const done    = completed.has(d.day);
      const ctxList = contextDays(currentDay);
      const ctxIdx  = ctxList.findIndex(function (x) { return x.day === currentDay; });
      const prevD   = ctxList[ctxIdx - 1];
      const nextD   = ctxList[ctxIdx + 1];
      const badgeCls = 'badge-' + d.type;

      let metaBadges = `<span class="badge ${badgeCls}">${TYPE_LABEL[d.type] || d.type}</span>`;
      if (d.merged) metaBadges += ` <span class="badge badge-merged">Gộp ${d.merged}</span>`;

      const inner = d.type === 'integration' ? renderIntegration(d)
                  : d.type === 'orientation' ? renderOrientation(d)
                  : d.type === 'bonus' ? renderBonusContent(d)
                  : renderTabs(d);

      const completeBtnHtml = done
        ? `<button class="complete-btn done" disabled>✓ Đã hoàn thành</button>`
        : `<button class="complete-btn" onclick="markComplete(${d.day})">Đánh dấu hoàn thành</button>`;

      const moduleCrumb = d.type === 'bonus' ? 'Bonus' : ('Module ' + d.module);
      const dayCrumb     = d.type === 'bonus' ? 'Miễn phí' : ('Ngày ' + d.day);
      const eyebrow      = d.type === 'bonus' ? 'Bonus · Miễn phí cho học viên' : ('Module ' + d.module + ' — Ngày ' + d.day);

      document.getElementById('main-content').innerHTML = `
        <div class="breadcrumb">
          <a href="academy-courses.html">Khóa học</a><span>›</span>
          <a href="academy-lessons.html">QROS</a><span>›</span>
          <span>${moduleCrumb}</span><span>›</span>
          <span>${dayCrumb}</span>
        </div>

        <p class="day-eyebrow">${eyebrow}</p>
        <h1 class="day-title">${d.title}</h1>
        <div class="day-meta">${metaBadges}</div>

        ${inner}

        <div class="bottom-nav">
          ${prevD
            ? `<a href="?day=${prevD.day}" class="nav-btn" onclick="return goDay(${prevD.day})">
                 <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                 Ngày ${prevD.day}
               </a>`
            : `<span></span>`}
          ${completeBtnHtml}
          ${nextD
            ? `<a href="?day=${nextD.day}" class="nav-btn" onclick="return goDay(${nextD.day})">
                 Ngày ${nextD.day}
                 <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
               </a>`
            : `<span></span>`}
        </div>`;
    }

    function renderOrientation(d) {
      const c = CONTENT[d.day] || {};
      const url = c.videoUrl || '';
      const videoEl = url
        ? `<iframe src="${url}" allowfullscreen></iframe>`
        : `<div class="video-ph-text">
             <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" style="margin:0 auto 10px;display:block;opacity:.35"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
             Video Mở Đầu<br/><span style="font-size:.7rem;opacity:.55">Nhúng YouTube embed URL vào CONTENT[0].videoUrl</span>
           </div>`;
      return `
        <div class="video-box">${videoEl}</div>
        ${c.videoDesc ? `<div class="reading-content" style="margin-top:16px"><p>${c.videoDesc}</p></div>` : ''}`;
    }

    function renderTabs(d) {
      return `
        <div class="tab-nav">
          <button class="tab-btn active"  onclick="switchTab(event,'video')">Video</button>
          <button class="tab-btn"         onclick="switchTab(event,'baodoc')">Bài Đọc</button>
          <button class="tab-btn"         onclick="switchTab(event,'workbook')">Workbook</button>
        </div>
        <div id="tab-video"    class="tab-panel active">${renderVideo(d)}</div>
        <div id="tab-baodoc"   class="tab-panel">${renderReading(d)}</div>
        <div id="tab-workbook" class="tab-panel">${renderWorkbook(d)}</div>`;
    }

    function renderVideo(d) {
      const c = CONTENT[d.day] || {};

      function videoBox(url, label, contentKey) {
        const el = url
          ? `<iframe src="${url}" allowfullscreen></iframe>`
          : `<div class="video-ph-text">
               <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"
                    style="margin:0 auto 10px;display:block;opacity:.35">
                 <circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/>
               </svg>
               ${label}<br/>
               <span style="font-size:.7rem;opacity:.55">Thêm URL vào CONTENT[${d.day}].${contentKey}</span>
             </div>`;
        return `<div class="video-box">${el}</div>`;
      }

      // Ngày 1: hiển thị video mở đầu trước, sau đó video bài học
      if (d.day === 1 && 'orientationUrl' in c) {
        return `
          <p style="font-family:'Inter',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:#C5A880;margin-bottom:10px">Video Mở Đầu — Xem trước</p>
          ${videoBox(c.orientationUrl, 'Video Mở Đầu — 4–5 phút', 'orientationUrl')}
          <p style="font-family:'Inter',sans-serif;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:#A8A39D;margin:24px 0 10px">Bài Học Ngày 1</p>
          ${videoBox(c.videoUrl, 'Video Ngày 1 — "Nhà Tù Vô Hình"', 'videoUrl')}
          ${c.videoDesc ? `<div class="reading-content" style="margin-top:16px"><p>${c.videoDesc}</p></div>` : ''}`;
      }

      const descHtml = c.videoDesc
        ? `<div class="reading-content" style="margin-top:20px"><p>${c.videoDesc}</p></div>`
        : `<div class="reading-content"><div class="ph-block">✎ Mô tả ngắn bài học Ngày ${d.day} — 2–3 câu tóm tắt nội dung video và mục tiêu học.</div></div>`;

      return `${videoBox(c.videoUrl || '', `Video Ngày ${d.day} — "${d.title}"`, 'videoUrl')}${descHtml}`;
    }

    function renderReading(d) {
      const c = CONTENT[d.day];
      if (c && c.reading) return c.reading;
      return `
        <div class="reading-content">
          <div class="ph-block">
            ✎ Bài Đọc Đầy Đủ — Ngày ${d.day}: "${d.title}".<br/>
            Format: Roman numeral sections → nội dung chính → Tóm Tắt + bridge sang ngày tiếp theo.
          </div>
          <h2>I. [Tiêu đề phần 1]</h2>
          <div class="ph-block">Nội dung phần I — 100–250 từ</div>
          <hr/>
          <h2>II. [Tiêu đề phần 2]</h2>
          <div class="ph-block">Nội dung phần II — 100–250 từ</div>
          <hr/>
          <h2>III. Tóm Tắt Ngày ${d.day}</h2>
          <div class="ph-block">
            [Một câu tóm lại toàn bài]<br/><br/>
            3 điểm cần mang theo + bridge sang Ngày ${d.day < 21 ? d.day + 1 : '—'}
          </div>
        </div>`;
    }

    function renderWorkbook(d) {
      const key   = 'qros_wb_' + d.day;
      const saved = JSON.parse(localStorage.getItem(key) || '{}');
      const c     = CONTENT[d.day];
      const nextD = DAYS.find(function (x) { return x.day === d.day + 1; });

      function ta(fieldId, rows) {
        return `<textarea class="wb-ta" style="min-height:${Math.max(72, (rows || 3) * 26)}px"
          placeholder="Viết câu trả lời của bạn tại đây..."
          oninput="saveWb(${d.day},'${fieldId}',this.value)">${saved[fieldId] || ''}</textarea>`;
      }

      // Real content from CONTENT object
      if (c && c.workbook) {
        let html = '<div>';
        c.workbook.forEach(function (ex, ei) {
          html += `<div class="wb-block">
            <div class="wb-ex-title">${ex.title}</div>
            <div class="wb-time">~${ex.time}</div>
            <div class="wb-instruction">${ex.instruction.replace(/\n/g, '<br/>')}</div>
            ${ex.note ? `<div class="wb-note">${ex.note}</div>` : ''}`;
          ex.fields.forEach(function (f) {
            html += `<div class="wb-q">${f.label}</div>`;
            if (f.hint) html += `<div class="wb-hint">${f.hint.replace(/\n/g, '<br/>')}</div>`;
            html += ta(f.id, f.rows);
          });
          html += '</div>';
        });
        const cl = c.closing || {};
        html += `<div class="wb-closing">
          <div class="wb-closing-quote">"${(cl.quote || '').replace(/\n/g, '<br/>')}"</div>
          <div class="wb-tomorrow">${cl.next || (nextD ? `Ngày mai (Ngày ${nextD.day}): ${nextD.title} — Hoàn thành workbook trước khi xem.` : '')}</div>
        </div></div>`;
        return html;
      }

      // Placeholder
      return `
        <div>
          <div class="ph-block" style="margin-bottom:26px">
            ✎ Workbook Ngày ${d.day}: "${d.title}" — câu trả lời được tự động lưu vào trình duyệt.
          </div>
          <div class="wb-block">
            <div class="wb-ex-title">BÀI TẬP 1: [Tên bài tập]</div>
            <div class="wb-time">~15 phút</div>
            <div class="wb-instruction">[Hướng dẫn 2–4 câu]</div>
            <div class="wb-q">[Câu hỏi 1]</div>
            ${ta('q1', 4)}
          </div>
          <div class="wb-block">
            <div class="wb-ex-title">BÀI TẬP 2: [Tên bài tập]</div>
            <div class="wb-time">~15 phút</div>
            <div class="wb-instruction">[Hướng dẫn 2–4 câu]</div>
            <div class="wb-q">[Câu hỏi 2a]</div>
            ${ta('q2a', 3)}
            <div class="wb-q">[Câu hỏi 2b]</div>
            ${ta('q2b', 3)}
          </div>
          <div class="wb-closing">
            <div class="wb-closing-quote">"[Câu kết workbook]"</div>
            <div class="wb-tomorrow">${nextD ? `Ngày mai (Ngày ${nextD.day}): ${nextD.title} — Hoàn thành workbook trước khi xem.` : 'Bạn đã hoàn thành hành trình 21 ngày.'}</div>
          </div>
        </div>`;
    }

    function renderIntegration(d) {
      const info  = INTEGRATION[d.day] || { why: '[Lý do ngày tích hợp]', activity: '[Mô tả hoạt động]', question: '[Câu hỏi journaling]', next: d.day + 1 };
      const key   = 'qros_wb_' + d.day;
      const saved = JSON.parse(localStorage.getItem(key) || '{}');
      const nextD = DAYS.find(function (x) { return x.day === info.next; });

      return `
        <div class="integration-box">
          <p style="font-family:'Inter',sans-serif;font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:#C5A880;margin-bottom:12px">
            Ngày Tích Hợp — Không có bài mới
          </p>
          <p style="font-family:'Inter',sans-serif;font-size:.88rem;color:#3E2723;line-height:1.7;max-width:560px">${info.why}</p>
        </div>

        <p class="section-title">Hoạt Động Duy Nhất Hôm Nay</p>
        <p style="font-family:'Inter',sans-serif;font-size:.88rem;color:#2B2B2B;line-height:1.75;margin-bottom:22px">${info.activity}</p>

        <div class="ph-block" style="margin-bottom:28px">
          ✎ Audio hướng dẫn thiền sẽ được nhúng tại đây (SoundCloud / file MP3)
        </div>

        <hr style="border:none;border-top:1px solid rgba(197,168,128,.18);margin:28px 0"/>

        <p class="section-title">Câu Hỏi Journaling</p>
        <p style="font-family:'Playfair Display',serif;font-size:.95rem;font-style:italic;color:#3E2723;margin-bottom:14px">"${info.question}"</p>
        <textarea class="wb-ta" style="min-height:130px"
          placeholder="Viết tự do — không lọc, không chỉnh sửa..."
          oninput="saveWb(${d.day},'journal',this.value)">${saved['journal'] || ''}</textarea>

        <div class="wb-tomorrow">
          ${nextD ? `Ngày mai (Ngày ${nextD.day}): ${nextD.title} — Hoàn thành journaling trước khi xem.` : ''}
        </div>`;
    }

    function renderBonusContent(d) {
      const key   = 'qros_wb_' + d.day;
      const saved = JSON.parse(localStorage.getItem(key) || '{}');

      function ta(fieldId, rows) {
        return `<textarea class="wb-ta" style="min-height:${Math.max(56, (rows || 2) * 26)}px"
          placeholder="Viết câu trả lời của bạn tại đây..."
          oninput="saveWb(${d.day},'${fieldId}',this.value)">${saved[fieldId] || ''}</textarea>`;
      }

      function cell(fieldId) {
        return `<textarea class="wb-ta" style="min-height:38px;padding:6px 8px;font-size:.8rem"
          oninput="saveWb(${d.day},'${fieldId}',this.value)">${saved[fieldId] || ''}</textarea>`;
      }

      const c = CONTENT[d.day];
      if (c && c.render) return c.render(ta, cell);
      return '<div class="reading-content"><div class="ph-block">Nội dung bonus sẽ sớm được cập nhật.</div></div>';
    }

    // ═══════════════════════════════════════════════════════════════
    // INTERACTIONS
    // ═══════════════════════════════════════════════════════════════
    function switchTab(e, id) {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
      e.currentTarget.classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
    }

    function markComplete(day) {
      completed.add(day);
      saveProgress();
      renderSidebar();
      var btn = document.querySelector('.complete-btn');
      if (btn) { btn.textContent = '✓ Đã hoàn thành'; btn.classList.add('done'); btn.disabled = true; }
    }

    function goDay(day) {
      currentDay = day;
      history.pushState({}, '', '?day=' + day);
      renderSidebar();
      renderMobileDaybar();
      renderContent();
      closeDrawer();
      window.scrollTo(0, 0);
      return false;
    }

    function saveWb(day, field, value) {
      var key   = 'qros_wb_' + day;
      var saved = JSON.parse(localStorage.getItem(key) || '{}');
      saved[field] = value;
      localStorage.setItem(key, JSON.stringify(saved));
    }

    // ═══════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════
    var params = new URLSearchParams(window.location.search);
    currentDay = parseInt(params.get('day')) || 1;
    renderSidebar();
    renderMobileDaybar();
    renderContent();

    window.addEventListener('popstate', function () {
      var p = new URLSearchParams(window.location.search);
      currentDay = parseInt(p.get('day')) || 1;
      renderSidebar();
      renderMobileDaybar();
      renderContent();
    });

    document.getElementById('logout-btn').addEventListener('click', async function () {
      await window._supabase.auth.signOut();
      window.location.href = 'academy.html';
    });
  </script>

</body>
</html>
